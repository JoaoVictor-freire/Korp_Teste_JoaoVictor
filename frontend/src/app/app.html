<router-outlet />

<section class="toast-stack" aria-live="polite" aria-atomic="true">
  @for (toast of toastService.toasts(); track toast.id) {
    <article class="toast" [class.toast-error]="toast.kind === 'error'" [class.toast-success]="toast.kind === 'success'">
      <p>{{ toast.text }}</p>
      <button type="button" (click)="toastService.dismiss(toast.id)" aria-label="Fechar mensagem">×</button>
    </article>
  }
</section>
