<section class="dashboard-shell">
  <header class="topbar">
    <div class="topbar-left">
      <button type="button" class="menu-button" (click)="toggleSidebar()" aria-label="Abrir menu lateral">
        <mat-icon>menu</mat-icon>
      </button>

      <div>
        <h1>EmiteJa</h1>
      </div>
    </div>

    <div class="topbar-right">
      <div class="user-badge">
        <span>Usuario</span>
        <strong>{{ user()?.name || 'usuario' }}</strong>
      </div>
      <app-dashboard-notifications />
      <button type="button" (click)="logout()">Logout</button>
    </div>
  </header>

  <div class="dashboard-body">
    <div class="sidebar-backdrop" [class.open]="sidebarOpen()" (click)="closeSidebar()"></div>

    <aside class="sidebar" [class.open]="sidebarOpen()">
      <div class="sidebar-header">
        <strong>Navegacao</strong>
        <button type="button" class="sidebar-close" (click)="closeSidebar()" aria-label="Fechar menu">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <nav class="sidebar-nav" aria-label="Ferramentas">
        <a routerLink="/dashboard/stock" routerLinkActive="active" (click)="closeSidebar()">
          <span>Produtos</span>
        </a>
        <a routerLink="/dashboard/history-products" routerLinkActive="active" (click)="closeSidebar()">
          <span>Estoque produtos</span>
        </a>        
        <a routerLink="/dashboard/invoices" routerLinkActive="active" (click)="closeSidebar()">
          <span>Notas</span>
        </a>
        <a routerLink="/dashboard/history-invoices" routerLinkActive="active" (click)="closeSidebar()">
          <span>Emissão notas</span>
        </a>
      </nav>
    </aside>

    <main class="dashboard-content">
      @if (showMetrics()) {
        <section class="metrics">
          <article>
            <span>Produtos</span>
            <strong>{{ stockStore.productCount() }}</strong>
          </article>
          <article>
            <span>Notas</span>
            <strong>{{ invoicesStore.invoiceCount() }}</strong>
          </article>
          <article>
            <span>Notas abertas</span>
            <strong>{{ invoicesStore.openInvoiceCount() }}</strong>
          </article>
        </section>
      }
      <router-outlet />
    </main>
  </div>
</section>
