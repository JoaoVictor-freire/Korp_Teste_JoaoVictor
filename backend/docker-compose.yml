services:
  stock-service:
    build:
      context: .
      dockerfile: Dockerfile.stock
    env_file:
      - .env
    environment:
      GIN_MODE: release
      STOCK_SERVICE_HOST: 0.0.0.0
      STOCK_SERVICE_PORT: 8081
    ports:
      - "8081:8081"

  billing-service:
    build:
      context: .
      dockerfile: Dockerfile.billing
    depends_on:
      - stock-service
    env_file:
      - .env
    environment:
      GIN_MODE: release
      STOCK_SERVICE_HOST: stock-service
      STOCK_SERVICE_PORT: 8081
      BILLING_SERVICE_HOST: 0.0.0.0
      BILLING_SERVICE_PORT: 8082
    ports:
      - "8082:8082"
